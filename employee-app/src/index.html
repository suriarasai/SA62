<!DOCTYPE html>
<!--
  index.html
  Angular's single HTML file entry point.
  Angular replaces <app-root> with the rendered AppComponent at runtime.
  The <base href="/"> tag is required for Angular Router to resolve URLs correctly.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Employee Management</title>
  <!-- Angular CLI injects the compiled JS bundles and styles.css here at build time -->
</head>
<body>
  <!-- Angular bootstraps AppComponent here (matches selector: 'app-root') -->
  <app-root></app-root>
</body>
</html>
