spring.application.name=restfulapp


# ── DataSource (MySQL) ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/restapp?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=password123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
#This line is essential if you are using an initial SQL script
#H2 schema.sql (DDL) data.sql (DML)
#MySQL one data.sql (DDL+DML)
spring.sql.init.mode=always
#spring.sql.init.mode=never
spring.jpa.show-sql=true
#This property is to print the SQL commans in console 
#Needed Model Mapping + JPA
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
