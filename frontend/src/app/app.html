<header class="app-header">
  <span class="app-title">Employee Management</span>
  <span class="app-subtitle">Spring Boot REST + Angular</span>
</header>

<main class="app-main">

  <!--  List view (default)  -->
  @if (!showForm()) {
    <app-employee-list
      (editEmployee)="onShowForm($event)">
    </app-employee-list>
  }

  <!--  Form view  -->
  @if (showForm()) {
    <app-employee-form
      [employeeToEdit]="selectedEmployee()"
      (saved)="onSaved()"
      (cancelled)="onCancelled()">
    </app-employee-form>
  }

</main>
