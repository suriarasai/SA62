<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title th:text="'Order #' + ${order.id} + ' – Choppee'">Order Detail</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<h1>Order #<span th:text="${order.id}">0</span></h1>

<table border="0" cellpadding="4">
    <tr>
        <th align="right">Status</th>
        <td><strong th:text="${order.status}">STATUS</strong></td>
    </tr>
    <tr>
        <th align="right">Order Date</th>
        <!-- LocalDateTime display -->
        <td th:text="${#temporals.format(order.orderDate,'dd MMM yyyy HH:mm')}">Date</td>
    </tr>
    <tr th:if="${order.deliveredAt != null}">
        <th align="right">Delivered</th>
        <td th:text="${#temporals.format(order.deliveredAt,'dd MMM yyyy')}">Date</td>
    </tr>
    <tr>
        <th align="right">Ship To</th>
        <td th:text="${order.shippingAddress}">Address</td>
    </tr>
    <tr th:if="${order.notes != null and !order.notes.isEmpty()}">
        <th align="right">Notes</th>
        <td th:text="${order.notes}">Notes</td>
    </tr>
</table>

<br/>
<h2>Items</h2>
<table border="1" cellpadding="6" cellspacing="0">
    <thead>
        <tr>
            <th>Product</th>
            <th>Brand</th>
            <th>Unit Price (at purchase)</th>
            <th>Qty</th>
            <th>Subtotal</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="item : ${order.items}">
            <td>
                <a th:href="@{/products/{id}(id=${item.product.id})}"
                   th:text="${item.product.name}">Product</a>
            </td>
            <td th:text="${item.product.brand}">Brand</td>
            <!-- Double – unit price snapshot at checkout time -->
            <td th:text="'$' + ${#numbers.formatDecimal(item.unitPrice,1,2)}">$0.00</td>
            <!-- Integer – quantity -->
            <td th:text="${item.quantity}">1</td>
            <td th:text="'$' + ${#numbers.formatDecimal(item.subtotal,1,2)}">$0.00</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="4" align="right"><strong>Order Total:</strong></td>
            <td><strong th:text="'$' + ${#numbers.formatDecimal(order.totalAmount,1,2)}">$0.00</strong></td>
        </tr>
    </tfoot>
</table>

<br/>
<a th:href="@{/orders}">&larr; Back to My Orders</a>
&nbsp;|&nbsp;
<a th:href="@{/products}">Continue Shopping</a>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
