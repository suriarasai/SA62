# ============================================================
#  Choppee â€“ application.properties
#  Spring Boot 3.4.x | Spring 6.x | Java 17 LTS
# ============================================================

# ”€ Application ”€
spring.application.name=Choppee

# Embedded H2 Database ”€
spring.datasource.url=jdbc:h2:mem:choppeedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ”€ H2 Console (dev) ”€
#   Access: http://localhost:8080/h2-console
#   JDBC URL: jdbc:h2:mem:choppeedb
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

#  JPA / Hibernate ”€
# none = rely entirely on schema.sql for DDL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Defer JPA datasource init so schema.sql + data.sql run AFTER
# the EntityManagerFactory is set up (required in Spring Boot 3.x)
spring.jpa.defer-datasource-initialization=true

#  SQL Initialisation ”€
# always = run schema.sql and data.sql on every startup
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

#  Thymeleaf ”€
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
# Disable cache in development
spring.thymeleaf.cache=false



#  Server ”€
server.port=8080
server.servlet.context-path=/

# ”€ Logging ”€
logging.level.sg.edu.choppee=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
