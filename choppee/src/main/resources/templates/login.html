<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login – Choppee</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="page-wrapper">
    <div class="card">
        <h1>Sign In</h1>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required autofocus
                       placeholder="your_username"/>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" required
                       placeholder="••••••••"/>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <p style="margin-top:16px; text-align:center; font-size:0.92rem;">
            Don't have an account? <a th:href="@{/register}">Register here</a>
        </p>

        <div class="hint-box">
            <strong>Demo credentials:</strong><br/>
            <code>john_doe</code> / <code>password123</code><br/>
            <code>jane_smith</code> / <code>secret456</code><br/>
            <code>admin</code> / <code>admin</code>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
